services:
  postgres:
    image: postgres:15-alpine
    container_name: agent_postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: SecurePass123!
      POSTGRES_DB: agent_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agent_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d agent_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: agent_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - agent_network

  adminer:
    image: adminer
    container_name: agent_adminer
    restart: always
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - agent_network

  backend:
    image: python:3.11-slim
    container_name: agent_backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend_venv:/app/venv  # ¡Volumen nombrado para el venv!
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+psycopg://admin:SecurePass123!@postgres:5432/agent_db
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - PATH=/app/venv/bin:$PATH  # Agregar venv al PATH
    networks:
      - agent_network
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        if [ ! -d /app/venv ]; then
          echo 'Creando venv...' &&
          python -m venv /app/venv;
        fi &&
        apt-get update &&
        apt-get install -y gcc libpq-dev &&
        /app/venv/bin/pip install --upgrade pip &&
        /app/venv/bin/pip install -r requirements-docker.txt &&
        /app/venv/bin/python manage.py api-venv
      "

  frontend:
    image: node:20-alpine
    container_name: agent_frontend
    working_dir: /app
    env_file:
      - ./frontend/.env.local
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - BACKEND_INTERNAL_URL=http://backend:8000/api/v1
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - HOST=0.0.0.0
      - PORT=3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    networks:
      - agent_network
    depends_on:
      - backend
    command: >
      sh -c "npm ci && npm run dev"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: agent_cloudflared
    command: tunnel --no-autoupdate --url http://backend:8000
    restart: unless-stopped
    networks:
      - agent_network
    depends_on:
      - backend

networks:
  agent_network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  frontend_node_modules:
  backend_venv: 
