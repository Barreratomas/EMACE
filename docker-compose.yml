services:
  postgres:
    image: postgres:15-alpine
    container_name: agent_postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: SecurePass123!
      POSTGRES_DB: agent_db

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - agent_network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d agent_db"]
      interval: 5s
      timeout: 5s
      retries: 5

    mem_limit: 512m

  qdrant:
    image: qdrant/qdrant:latest
    container_name: agent_qdrant
    restart: unless-stopped

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

    networks:
      - agent_network

    mem_limit: 512m

  adminer:
    image: adminer
    container_name: agent_adminer
    restart: unless-stopped

    ports:
      - "8081:8080"

    environment:
      ADMINER_DEFAULT_SERVER: postgres

    networks:
      - agent_network

    depends_on:
      postgres:
        condition: service_healthy

    mem_limit: 128m

  redis:
    image: redis:7-alpine
    container_name: agent_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - agent_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 256m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: agent_backend
    restart: unless-stopped

    working_dir: /app

    volumes:
      - ./backend:/app
      - /app/venv

    ports:
      - "8000:8000"

    env_file:
      - ./backend/.env

    environment:
      DATABASE_URL: postgresql+psycopg://admin:SecurePass123!@postgres:5432/agent_db
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: 1

    networks:
      - agent_network

    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy

    mem_limit: 1g

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent_worker
    restart: unless-stopped
    working_dir: /app
    command: arq app.infrastructure.worker.WorkerSettings
    volumes:
      - ./backend:/app
      - /app/venv
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://admin:SecurePass123!@postgres:5432/agent_db
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: 1
    networks:
      - agent_network
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy

    mem_limit: 1g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: agent_frontend
    restart: unless-stopped

    working_dir: /app

    env_file:
      - ./frontend/.env

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      BACKEND_INTERNAL_URL: http://backend:8000/api/v1
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: development
      HOSTNAME: 0.0.0.0 

    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

    ports:
      - "3000:3000"

    networks:
      - agent_network

    depends_on:
      - backend

    mem_limit: 2g

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: agent_cloudflared
    restart: unless-stopped

    command: tunnel --no-autoupdate --url http://backend:8000

    networks:
      - agent_network

    depends_on:
      - backend

    mem_limit: 128m

networks:
  agent_network:
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  frontend_node_modules: